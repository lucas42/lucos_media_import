version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    open-pull-requests-limit: 10
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    open-pull-requests-limit: 10
    allow:
      - dependency-type: all
    ignore:
      - dependency-name: "python"
        versions:
          # Base image is python:3.14 (no variant suffix). The Dependabot
          # normalised form for bare Python pre-releases is inferred as
          # *.pre.{prerelease_letter} (no variant segment). If this fails
          # silently, fall back to per-series range syntax from lucos_backups#186.
          - "*.pre.a"   # alpha
          - "*.pre.b"   # beta
          - "*.pre.rc*" # release candidate
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
